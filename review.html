<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Month Review — TSG</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
  .wrap{max-width:1200px;margin:0 auto;padding:24px 20px 60px}

  /* Dark theme cards */
  .card{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:22px 24px}
  .card-glow{box-shadow:0 0 0 1px rgba(205,228,83,.1),0 4px 24px rgba(0,0,0,.3)}

  /* Hero header */
  .hero{background:linear-gradient(135deg,#1e293b 0%,#0f172a 50%,#1a1a2e 100%);border:1px solid #334155;border-radius:16px;padding:32px;margin-bottom:28px;position:relative;overflow:hidden}
  .hero::before{content:'';position:absolute;top:-50%;right:-20%;width:400px;height:400px;background:radial-gradient(circle,rgba(205,228,83,.06) 0%,transparent 70%);pointer-events:none}
  .hero-month{font-size:56px;font-weight:900;letter-spacing:-.04em;line-height:1;background:linear-gradient(135deg,#CDE453,#a3c940);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .hero-year{font-size:56px;font-weight:900;letter-spacing:-.04em;line-height:1;color:#475569;margin-left:12px}
  .hero-sub{font-size:14px;color:#64748b;margin-top:8px}
  .hero-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:99px;font-size:12px;font-weight:700;background:rgba(205,228,83,.1);color:#CDE453;border:1px solid rgba(205,228,83,.2);margin-top:12px;text-transform:uppercase;letter-spacing:.5px}
  .hero-badge .dot{width:8px;height:8px;border-radius:50%;background:#CDE453}

  /* Metric pills */
  .metric-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
  .metric{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:16px;position:relative}
  .metric-accent{position:absolute;top:0;left:16px;right:16px;height:2px;border-radius:0 0 2px 2px}
  .metric .lbl{font-size:10px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-top:4px}
  .metric .val{font-size:26px;font-weight:800;color:#f1f5f9;letter-spacing:-.02em;line-height:1.2;margin-top:6px}
  .metric .sub{font-size:12px;color:#64748b;margin-top:4px}

  /* Section headers */
  .zone-hdr{margin:32px 0 16px;padding-top:24px;border-top:1px solid #1e293b}
  .zone-icon{font-size:18px;margin-right:6px}
  .zone-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:#64748b}
  .zone-title{font-size:18px;font-weight:700;color:#f1f5f9;margin-top:3px}
  .zone-sub{font-size:12px;color:#64748b;margin-top:2px}

  /* Brand rows */
  .b-row{border-radius:10px;padding:18px;margin-bottom:10px;border:1px solid;background:rgba(255,255,255,.02)}
  .b-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
  .b-name{display:flex;align-items:center;gap:10px}
  .b-name strong{font-weight:700;font-size:14px;color:#f1f5f9}
  .pill{display:inline-block;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:600;line-height:18px}
  .pill-g{background:rgba(22,163,74,.15);color:#4ade80;border:1px solid rgba(22,163,74,.3)}
  .pill-r{background:rgba(220,38,38,.15);color:#f87171;border:1px solid rgba(220,38,38,.3)}
  .bar-w{height:6px;background:#334155;border-radius:6px;position:relative;overflow:hidden}
  .bar-f{position:absolute;height:100%;border-radius:6px;transition:width .6s ease}
  .bar-lbl{display:flex;justify-content:space-between;margin-top:5px;font-size:11px;color:#64748b}
  .logo{width:24px;height:24px;object-fit:contain;border-radius:6px;flex-shrink:0}
  .g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .st-label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;font-weight:600}
  .st-val{font-size:22px;font-weight:700;line-height:1.2;color:#f1f5f9}
  .up{color:#4ade80;font-weight:600}
  .dn{color:#f87171;font-weight:600}

  /* Insights */
  .insight{background:linear-gradient(135deg,rgba(205,228,83,.04),rgba(205,228,83,.01));border:1px solid rgba(205,228,83,.15);border-radius:10px;padding:16px 18px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start}
  .insight-icon{font-size:20px;flex-shrink:0;line-height:1.4}
  .insight-text{font-size:13px;color:#cbd5e1;line-height:1.5}
  .insight-text strong{color:#CDE453;font-weight:700}

  /* Rankings */
  .rk{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:14px;text-align:center}
  .rk-l{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;font-weight:600}
  .rk-v{font-size:24px;font-weight:800;color:#f1f5f9}
  .rk-s{font-size:11px;color:#475569;margin-top:2px}

  /* Horizontal bars */
  .hb{display:flex;align-items:center;gap:8px;margin-bottom:5px}
  .hb-l{width:52px;font-size:12px;flex-shrink:0;color:#94a3b8}
  .hb-t{flex:1;height:20px;border-radius:4px;overflow:hidden;position:relative;background:#1e293b}
  .hb-f{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;transition:width .5s ease}
  .hb-f span{font-size:10px;font-weight:600}

  /* FY table */
  .tbl{width:100%;border-collapse:collapse;font-size:12px}
  .tbl th{text-align:right;padding:6px 8px;font-size:11px;color:#64748b;font-weight:600;border-bottom:1px solid #334155;text-transform:uppercase;letter-spacing:.3px}
  .tbl th:first-child{text-align:left}
  .tbl td{padding:6px 8px;text-align:right;color:#94a3b8;border-bottom:1px solid #1e293b}
  .tbl td:first-child{text-align:left;font-weight:500;color:#cbd5e1}
  .tbl .bold td{font-weight:600;color:#f1f5f9}

  /* New Sales dark section */
  .ns{background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);border:1px solid #334155;border-radius:14px;padding:24px;color:#fff}
  .ns-glass{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:12px 18px;text-align:center}

  /* Charts */
  .chart-wrap{background:#0f172a;border:1px solid #334155;border-radius:10px;padding:16px}

  /* Footer */
  .footer{text-align:center;padding:24px 0;font-size:11px;color:#475569;line-height:1.6}
  .footer a{color:#CDE453;font-size:12px}

  .mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}.mb-20{margin-bottom:20px}.mb-24{margin-bottom:24px}
  .mt-8{margin-top:8px}.mt-12{margin-top:12px}
  .fx-b{display:flex;justify-content:space-between;align-items:center}
  .fx-c{display:flex;align-items:center;gap:8px}

  .loading{display:flex;align-items:center;justify-content:center;min-height:60vh;font-size:14px;color:#64748b}
  .spinner{width:24px;height:24px;border:3px solid #334155;border-top-color:#CDE453;border-radius:50%;animation:spin .8s linear infinite;margin-right:12px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .error-box{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.3);color:#f87171;padding:20px;border-radius:10px;font-size:13px;margin:40px auto;max-width:600px;text-align:center}

  @media(max-width:900px){.metric-row,.g4{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}.hero-month,.hero-year{font-size:36px}}
</style>
</head>
<body>

<script src="/nav.js"></script>

<div class="wrap">
  <div id="loading" class="loading"><div class="spinner"></div>Loading from Airtable&hellip;</div>
  <div id="error"></div>
  <div id="app"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
var C={tsg:{color:"#2d6e0e",accent:"#CDE453",bg:"rgba(205,228,83,.06)",bd:"rgba(205,228,83,.15)"},wll:{color:"#0891b2",accent:"#6BD4EC",bg:"rgba(107,212,236,.06)",bd:"rgba(107,212,236,.15)"},nv:{color:"#FF0077",accent:"#ff3399",bg:"rgba(255,0,119,.06)",bd:"rgba(255,0,119,.15)"}};
var LOGOS={tsg:"https://cdn.shopify.com/s/files/1/1070/8974/files/TSG-Logo-Roundel-Black.png?v=1772037610",wll:"https://cdn.shopify.com/s/files/1/1070/8974/files/WeLoveLEDs-640px--MASTER.png?v=1772124903",nv:"https://cdn.shopify.com/s/files/1/1070/8974/files/NV-Logo-640px--Grey_s-Stuff.png?v=1772124894"};
var FY_START_MONTH=12;

function f(n){return"\u00A3"+Math.round(Number(n)||0).toLocaleString("en-GB")}
function fk(n){n=Number(n)||0;return n>=1000?"\u00A3"+Math.round(n/1000)+"k":"\u00A3"+Math.round(n)}
function ps(n){return(n>0?"+":"")+n+"%"}
function po(a,b){if(!b)return 0;return Math.round(((a-b)/b)*100)}
// poF: percent change with smarter precision. Returns 1dp when the magnitude is
// under 10% (so a real +0.3% reads as "+0.3%" instead of being rounded to 0%
// and printing as a misleading flat reading), and a whole integer otherwise.
// Used wherever a small YoY or vs-target gap matters.
function poF(a,b){if(!b)return 0;var p=((a-b)/b)*100;return Math.abs(p)<10?Math.round(p*10)/10:Math.round(p)}
function psF(n){return(n>0?"+":"")+n+"%"}
function dl(v){if(v===0)return'<span style="color:#94a3b8">\u2194 0%</span>';var p=v>0;return'<span class="'+(p?"up":"dn")+'">'+(p?"\u25B2":"\u25BC")+" "+(p?"+":"")+v+"%</span>"}
function pl(s){var c=s==="Above"||s==="Ahead"?"pill-g":"pill-r";return'<span class="pill '+c+'">'+s+"</span>"}
function mkbar(val,tgt,color){
  var pct=tgt>0?Math.min(val/tgt*100,100):0;
  return'<div class="bar-w"><div class="bar-f" style="width:'+pct+"%;background:"+color+'"></div></div><div class="bar-lbl"><span>'+Math.round(pct)+"% of target</span><span>"+f(val)+" / "+f(tgt)+"</span></div>";
}
function hbar(items,mx,color){
  var o="";items.forEach(function(it){
    var w=mx>0?(it.v/mx)*100:0;
    var fc=it.h?color:"#334155";var lc=it.h?"#f1f5f9":"#64748b";
    o+='<div class="hb"><span class="hb-l" style="color:'+lc+";font-weight:"+(it.h?700:400)+'">'+it.l+"</span>";
    o+='<div class="hb-t">';
    o+='<div class="hb-f" style="width:'+w+"%;background:"+fc+'">';
    if(w>30)o+='<span style="color:#fff">'+f(it.v)+"</span>";
    o+="</div></div>";
    if(w<=30)o+='<span style="font-size:11px;color:#64748b">'+f(it.v)+"</span>";
    o+="</div>";
  });return o;
}
function parseMY(my){
  if(!my)return null;
  var ms=["jan","feb","mar","apr","may","jun","jul","aug","sep","oct","nov","dec"];
  var parts=my.replace(/[-\s]+/g," ").trim().split(" ");
  if(parts.length<2)return null;
  var mi=ms.indexOf(parts[0].toLowerCase().substring(0,3));
  if(mi<0)return null;var yr=parseInt(parts[1]||parts[0]);
  if(yr<100)yr+=2000;if(isNaN(yr))return null;
  return{month:mi+1,year:yr,key:yr+"-"+String(mi+1).padStart(2,"0")};
}
function monthShort(m){return["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][m]}
function monthFull(m){return["","January","February","March","April","May","June","July","August","September","October","November","December"][m]}
function normConv(v){if(v===null||v===undefined)return 0;v=Number(v);if(v>0&&v<1)return Math.round(v*100);return Math.round(v);}
function fyPos(month){return month>=12?month-12:month}
function fyStart(month,year){return month>=12?year:year-1}
function fyKeys(startYear,maxPos){
  var keys=[];for(var p=0;p<=maxPos;p++){var m=p===0?12:p,y=p===0?startYear:startYear+1;keys.push(y+"-"+String(m).padStart(2,"0"));}return keys;
}
function fyLabel(sy){return"FY"+sy%100+"/"+(sy+1)%100}
// Full FY keys (all 12 months Dec-Nov)
function fyKeysFull(startYear){return fyKeys(startYear,11);}

// ============================================================
function processData(raw){
  var D={};
  var now=new Date();
  var pm=new Date(now.getFullYear(),now.getMonth()-1,1);
  var prevMonth=pm.getMonth()+1,prevYear=pm.getFullYear();
  var prevKey=prevYear+"-"+String(prevMonth).padStart(2,"0");

  D.month=monthShort(prevMonth);D.year=prevYear;
  D.monthName=monthFull(prevMonth);D.prevKey=prevKey;D.prevMonth=prevMonth;D.prevYear=prevYear;

  var invByKey={},convByKey={},ovByKey={};
  raw.invoiced.forEach(function(r){var p=parseMY(r.monthYear);if(p)invByKey[p.key]=r;});
  raw.conversions.forEach(function(r){var p=parseMY(r.monthYear);if(p)convByKey[p.key]=r;});
  raw.overview.forEach(function(r){var p=parseMY(r.monthYear);if(p)ovByKey[p.key]=r;});
  var allKeys=Object.keys(invByKey).sort();
  D.invByKey=invByKey;D.allKeys=allKeys;

  var inv=invByKey[prevKey]||{};var conv=convByKey[prevKey]||{};var ov=ovByKey[prevKey]||null;

  D.tsgVal=(ov&&ov.tsgInvoicedToDate)||inv.tsg||0;
  D.wllVal=(ov&&ov.wllInvoicedToDate)||inv.wll||0;
  D.nvVal=(ov&&ov.nvInvoicedToDate)||inv.nv||0;
  D.combVal=D.tsgVal+D.wllVal+D.nvVal;

  D.tsgTgt=(ov&&ov.tsgTarget)||inv.tsgTarget||0;
  D.wllTgt=(ov&&ov.wllTarget)||inv.wllTarget||0;
  D.nvTgt=(ov&&ov.nvTarget)||inv.nvTarget||0;
  D.combTgt=D.tsgTgt+D.wllTgt+D.nvTgt;

  D.nsVal=conv.salesConfirmed||0;D.nsTgt=conv.newSalesTarget||inv.tsgNewSalesTarget||0;
  D.nsEnq=conv.enquiries||0;D.nsOrd=conv.orders||0;
  D.nsConv=normConv(conv.convRate);D.nsMargin=normConv(conv.margin);D.nsAov=conv.aov||0;

  // Same-month history
  D.histMonth=[];
  allKeys.forEach(function(k){
    var parts=k.split("-");
    if(parseInt(parts[1])===prevMonth){
      var r=invByKey[k],yr=parseInt(parts[0]),isCur=k===prevKey;
      var tsg=isCur?D.tsgVal:(r.tsg||0),wll=isCur?D.wllVal:(r.wll||0),nv=isCur?D.nvVal:(r.nv||0);
      D.histMonth.push({l:D.month+"-"+String(yr).slice(2),v:tsg+wll+nv,t:tsg+wll+nv,tsg:tsg,wll:wll,nv:nv,h:isCur});
    }
  });

  // New Sales history
  D.nsHistory=[];
  for(var yb=prevYear-4;yb<=prevYear;yb++){
    var k=yb+"-"+String(prevMonth).padStart(2,"0");var c=convByKey[k];
    if(c&&(c.salesConfirmed||c.enquiries||c.orders)){
      D.nsHistory.push({l:D.month+"-"+String(yb).slice(2),v:c.salesConfirmed||0,e:c.enquiries||0,o:c.orders||0,c:normConv(c.convRate),m:normConv(c.margin),aov:c.aov||0,h:yb===prevYear});
    }
  }

  // Rankings
  var allTotals=[];
  allKeys.forEach(function(k){var r=invByKey[k];var t=(k===prevKey)?D.combVal:((r.tsg||0)+(r.wll||0)+(r.nv||0));allTotals.push({key:k,t:t});});
  allTotals.sort(function(a,b){return b.t-a.t});
  var allTimeRank=allTotals.findIndex(function(x){return x.key===prevKey})+1;
  var sameMonthTotals=allTotals.filter(function(x){return parseInt(x.key.split("-")[1])===prevMonth});
  var monthRank=sameMonthTotals.findIndex(function(x){return x.key===prevKey})+1;

  var curFYStart=fyStart(prevMonth,prevYear),curFYPos=fyPos(prevMonth);
  var curFYKeyList=fyKeys(curFYStart,curFYPos);
  var fyTotals=curFYKeyList.map(function(k){var r=invByKey[k];if(!r)return{key:k,t:0};var t=(k===prevKey)?D.combVal:((r.tsg||0)+(r.wll||0)+(r.nv||0));return{key:k,t:t};}).sort(function(a,b){return b.t-a.t});
  var fyRank=fyTotals.findIndex(function(x){return x.key===prevKey})+1;
  D.rankings={fy:{r:fyRank||1,n:fyTotals.length||1},month:{r:monthRank||1,n:sameMonthTotals.length||1},all:{r:allTimeRank||1,n:allTotals.length||1}};

  // FY Running Totals
  function fyRunAt(startYear,maxPos){
    var keys=fyKeys(startYear,maxPos),sum={tsg:0,wll:0,nv:0};
    keys.forEach(function(k){var r=invByKey[k];if(!r)return;if(k===prevKey){sum.tsg+=D.tsgVal;sum.wll+=D.wllVal;sum.nv+=D.nvVal;}else{sum.tsg+=(r.tsg||0);sum.wll+=(r.wll||0);sum.nv+=(r.nv||0);}});
    sum.tot=sum.tsg+sum.wll+sum.nv;return sum;
  }
  function fyFull(sy){var keys=fyKeys(sy,11),s=0;keys.forEach(function(k){var r=invByKey[k];if(r)s+=(r.tsg||0)+(r.wll||0)+(r.nv||0);});return s;}
  var fyMonthsIn=curFYPos+1;
  var fy0=fyRunAt(curFYStart,curFYPos),fy1=fyRunAt(curFYStart-1,curFYPos),fy2=fyRunAt(curFYStart-2,curFYPos);
  D.run={tsg:[fy2.tsg,fy1.tsg,fy0.tsg],wll:[fy2.wll,fy1.wll,fy0.wll],nv:[fy2.nv,fy1.nv,fy0.nv],tot:[fy2.tot,fy1.tot,fy0.tot],labels:[fyLabel(curFYStart-2),fyLabel(curFYStart-1),fyLabel(curFYStart)],monthsIn:fyMonthsIn};
  D.run.avg=D.run.tot.map(function(t){return fyMonthsIn>0?Math.round(t/fyMonthsIn):0;});

  // Prev year same month
  var prevYrKey=(prevYear-1)+"-"+String(prevMonth).padStart(2,"0");
  var prevYrInv=invByKey[prevYrKey];
  if(prevYrInv){D.prevYr={tsg:prevYrInv.tsg||0,wll:prevYrInv.wll||0,nv:prevYrInv.nv||0};D.prevYr.tot=D.prevYr.tsg+D.prevYr.wll+D.prevYr.nv;}else D.prevYr=null;

  // FY month-by-month for trend charts (current FY + prev 2 FYs)
  D.fyStart=curFYStart;
  var fyMonthLabels=["Dec","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov"];
  D.fyLabels=fyMonthLabels;
  D.fyTrend=[];
  for(var offset=0;offset<3;offset++){
    var sy=curFYStart-offset;
    var series={label:fyLabel(sy),data:[],tsg:[],wll:[],nv:[],cumulative:[]};
    var cum=0;
    for(var p=0;p<12;p++){
      var m=p===0?12:p,y=p===0?sy:sy+1;
      var k=y+"-"+String(m).padStart(2,"0");
      var r=invByKey[k];
      var tsg=0,wll=0,nv=0;
      if(r){tsg=r.tsg||0;wll=r.wll||0;nv=r.nv||0;}
      if(k===prevKey){tsg=D.tsgVal;wll=D.wllVal;nv=D.nvVal;}
      var t=tsg+wll+nv;
      // Only include months that have data (or up to prevKey for current FY)
      if(offset===0&&p>curFYPos){series.data.push(null);series.tsg.push(null);series.wll.push(null);series.nv.push(null);series.cumulative.push(null);}
      else{cum+=t;series.data.push(t);series.tsg.push(tsg);series.wll.push(wll);series.nv.push(nv);series.cumulative.push(cum);}
    }
    D.fyTrend.push(series);
  }

  // FY-end projection (seasonal)
  var prevFYFull=fyFull(curFYStart-1);
  var prevFYSamePt=fy1.tot;
  var prev2FYFull=fyFull(curFYStart-2);
  var prev2FYSamePt=fy2.tot;
  var seasonalPct=0,seasonalCount=0;
  if(prevFYFull>0&&prevFYSamePt>0){seasonalPct+=prevFYSamePt/prevFYFull;seasonalCount++;}
  if(prev2FYFull>0&&prev2FYSamePt>0){seasonalPct+=prev2FYSamePt/prev2FYFull;seasonalCount++;}
  if(seasonalCount>0)seasonalPct=seasonalPct/seasonalCount;
  D.prevFYTotal=prevFYFull;
  if(seasonalPct>0&&seasonalPct<1){D.projTot=Math.round(fy0.tot/seasonalPct);D.projMethod="seasonal";D.projSeasonalPct=Math.round(seasonalPct*100);}
  else{D.projTot=fyMonthsIn>0?Math.round(fy0.tot/fyMonthsIn*12):0;D.projMethod="run-rate";D.projSeasonalPct=0;}
  D.projGrowth=D.prevFYTotal>0?poF(D.projTot,D.prevFYTotal):0;

  D.hasData=D.combVal>0||D.nsVal>0||D.nsEnq>0;
  return D;
}

// ============================================================
function render(D){
  var h="",med=["\uD83E\uDD47","\uD83E\uDD48","\uD83E\uDD49"];

  if(!D.hasData){
    h+='<div style="text-align:center;padding:60px 20px"><div style="font-size:48px;margin-bottom:16px">\uD83D\uDCC5</div>';

  });
  h+="</tbody></table></div>";

  // ==============================
  // NEW SALES
  // ==============================
  if(D.nsVal>0||D.nsEnq>0||D.nsOrd>0){
    h+='<div class="zone-hdr"><div class="zone-label"><span class="zone-icon">\uD83D\uDCDD</span>Order Intake</div><div class="zone-title">New Sales Orders \u2014 TSG</div><div class="zone-sub">Orders confirmed in '+D.monthName+" \u2014 separate from invoiced revenue</div></div>";

    h+='<div class="ns mb-20"><div style="display:flex;flex-wrap:wrap;gap:20px;align-items:center">';
    if(D.nsVal>0){
      h+='<div><div style="font-size:36px;font-weight:800;color:#CDE453;letter-spacing:-.03em;line-height:1">'+f(D.nsVal)+"</div>";
      if(D.nsTgt)h+='<div style="font-size:12px;color:#94a3b8;margin-top:4px">Target: '+f(D.nsTgt);
      if(D.nsTgt&&D.nsVal>=D.nsTgt)h+=' \u00B7 <span style="color:#4ade80;font-weight:700">+'+f(D.nsVal-D.nsTgt)+" above</span>";
      else if(D.nsTgt)h+=' \u00B7 <span style="color:#f87171;font-weight:700">'+f(D.nsVal-D.nsTgt)+" below</span>";
      if(D.nsTgt)h+="</div></div>";

function buildHistChart(D){
  var el=document.getElementById("histChart");
  if(!el||D.histMonth.length===0)return;
  Chart.defaults.color="#94a3b8";Chart.defaults.borderColor="#334155";
  new Chart(el.getContext("2d"),{
    type:"bar",
    data:{
      labels:D.histMonth.map(function(x){return x.l}),
      datasets:[
        {label:"TSG",data:D.histMonth.map(function(x){return x.tsg}),backgroundColor:D.histMonth.map(function(x){return x.h?"#CDE453":"rgba(205,228,83,0.2)"}),borderRadius:2,stack:"s"},
        {label:"WLL",data:D.histMonth.map(function(x){return x.wll}),backgroundColor:D.histMonth.map(function(x){return x.h?"#6BD4EC":"rgba(107,212,236,0.2)"}),borderRadius:2,stack:"s"},
        {label:"NV",data:D.histMonth.map(function(x){return x.nv}),backgroundColor:D.histMonth.map(function(x){return x.h?"#ff3399":"rgba(255,51,153,0.2)"}),borderRadius:2,stack:"s"}
      ]
    },
    options:{responsive:true,maintainAspectRatio:true,aspectRatio:2,
      plugins:{legend:{display:true,position:"top",labels:{usePointStyle:true,padding:14,font:{family:"Inter",size:11}}}},
      scales:{y:{beginAtZero:true,stacked:true,ticks:{font:{family:"Inter",size:11},callback:function(v){return"\u00A3"+Math.round(v/1000)+"k"}}},
        x:{stacked:true,grid:{display:false},ticks:{font:{family:"Inter",size:11}}}}
    }
  });
}

function buildFYCharts(D){
  Chart.defaults.color="#94a3b8";Chart.defaults.borderColor="#1e293b";
  var labels=D.fyLabels;
  var colors=["#CDE453","#64748b","#334155"];
  var bgColors=["rgba(205,228,83,0.15)","rgba(100,116,139,0.08)","rgba(51,65,85,0.04)"];
  var lineWidths=[3,2,1.5];

  // Bar chart: monthly revenue comparison
  var barEl=document.getElementById("fyBarChart");
  if(barEl&&D.fyTrend.length>0){
    var datasets=D.fyTrend.map(function(fy,i){
      return{label:fy.label,data:fy.data,backgroundColor:colors[i],borderRadius:3,barPercentage:0.85,categoryPercentage:0.8};
    });
    new Chart(barEl.getContext("2d"),{
      type:"bar",
      data:{labels:labels,datasets:datasets},
      options:{responsive:true,maintainAspectRatio:true,aspectRatio:1.8,
        plugins:{legend:{display:true,position:"top",labels:{usePointStyle:true,padding:14,font:{family:"Inter",size:11}}}},
        scales:{y:{beginAtZero:true,grid:{color:"#1e293b"},ticks:{font:{family:"Inter",size:10},callback:function(v){return"\u00A3"+Math.round(v/1000)+"k"}}},
          x:{grid:{display:false},ticks:{font:{family:"Inter",size:10}}}}
      }
    });
  }

  // Cumulative line chart
  var cumEl=document.getElementById("fyCumChart");
  if(cumEl&&D.fyTrend.length>0){
    // Build projection line for current FY
    var curFY=D.fyTrend[0];
    var projLine=curFY.cumulative.slice();
    // Find last real data point
    var lastIdx=-1;
    for(var i=0;i<projLine.length;i++){if(projLine[i]!==null)lastIdx=i;}
    // Project remaining months using prev FY shape
    if(lastIdx>=0&&lastIdx<11&&D.fyTrend.length>1){
      var prevFY=D.fyTrend[1];
      var prevFull=prevFY.cumulative[11]||1;
      var prevAtPt=prevFY.cumulative[lastIdx]||1;
      var growthFactor=prevAtPt>0?projLine[lastIdx]/prevAtPt:1;
      for(var j=lastIdx+1;j<12;j++){
        projLine[j]=Math.round((prevFY.cumulative[j]||0)*growthFactor);
      }
    }

    var datasets2=[];
    // Current FY actual
    datasets2.push({label:curFY.label,data:curFY.cumulative,borderColor:"#CDE453",backgroundColor:"rgba(205,228,83,0.1)",borderWidth:3,pointRadius:3,pointBackgroundColor:"#CDE453",fill:true,tension:0.3,spanGaps:false});
    // Projection (dashed)
    var projData=[];
    for(var k=0;k<12;k++){
      if(k<lastIdx)projData.push(null);
      else projData.push(projLine[k]);
    }
    datasets2.push({label:"Projected",data:projData,borderColor:"rgba(205,228,83,0.4)",borderWidth:2,borderDash:[6,4],pointRadius:0,fill:false,tension:0.3,spanGaps:true});
    // Previous FYs
    for(var fi=1;fi<D.fyTrend.length;fi++){
      datasets2.push({label:D.fyTrend[fi].label,data:D.fyTrend[fi].cumulative,borderColor:colors[fi],backgroundColor:bgColors[fi],borderWidth:lineWidths[fi],pointRadius:1,fill:false,tension:0.3});
    }

    new Chart(cumEl.getContext("2d"),{
      type:"line",
      data:{labels:labels,datasets:datasets2},
      options:{responsive:true,maintainAspectRatio:true,aspectRatio:1.8,
        plugins:{legend:{display:true,position:"top",labels:{usePointStyle:true,padding:14,font:{family:"Inter",size:11}}}},
        scales:{y:{beginAtZero:true,grid:{color:"#1e293b"},ticks:{font:{family:"Inter",size:10},callback:function(v){return v>=1000000?"\u00A3"+(v/1000000).toFixed(1)+"m":"\u00A3"+Math.round(v/1000)+"k"}}},
          x:{grid:{color:"#1e293b"},ticks:{font:{family:"Inter",size:10}}}}
      }
    });
  }
}

// ============================================================
async function init(){
  try{
    var res=await fetch("/sales-data");
    if(!res.ok)throw new Error("API returned "+res.status);
    var raw=await res.json();if(raw.error)throw new Error(raw.error);
    document.getElementById("loading").style.display="none";
    var D=processData(raw);render(D);
    if(raw.lastFetched){var ft=new Date(raw.lastFetched);if(window.setNavTimestamp)window.setNavTimestamp(ft);}
  }catch(err){
    document.getElementById("loading").style.display="none";
    document.getElementById("error").innerHTML='<div class="error-box"><strong>Failed to load data</strong><br><br>'+err.message+"</div>";
  }
}
init();
</script>
